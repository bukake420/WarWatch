[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."leaders"]
  timeout = 30

[functions."update"]
  timeout = 60

[[redirects]]
  from = "/api/leaders"
  to = "/.netlify/functions/leaders"
  status = 200

[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200

[[redirects]]
  from = "/api/aircraft"
  to = "/.netlify/functions/aircraft"
  status = 200

[[redirects]]
  from = "/api/update"
  to = "/.netlify/functions/update"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
